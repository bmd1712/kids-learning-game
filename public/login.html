<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                    },
                },
            },
        };
    </script>
    <style>
        .math-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
    <title>Đăng nhập | Học Toán Cùng Bé</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
        <div class="absolute top-10 left-10 text-primary/40 text-6xl font-bold math-float" style="animation-delay: 0s;">+</div>
        <div class="absolute top-20 right-20 text-primary/30 text-8xl font-bold math-float" style="animation-delay: 1s;">-</div>
        <div class="absolute bottom-20 left-1/4 text-primary/40 text-7xl font-bold math-float" style="animation-delay: 2s;">×</div>
        <div class="absolute bottom-10 right-1/4 text-primary/30 text-9xl font-bold math-float" style="animation-delay: 3s;">=</div>
        <div class="absolute top-1/2 left-10 text-primary/20 text-5xl font-bold math-float" style="animation-delay: 4s;">÷</div>
    </div>
    <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-5%] w-64 h-64 rounded-full bg-primary/5 blur-3xl"></div>
        <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 rounded-full bg-primary/10 blur-3xl"></div>
    </div>

    <main class="relative z-10 w-full max-w-lg">
        <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl shadow-primary/10 overflow-hidden border-4 border-primary/10">
            <div class="relative h-56 bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#ec5b13_1px,transparent_1px)] [background-size:20px_20px]"></div>
                <div class="relative z-10 text-center px-6">
                    <div class="flex justify-center mb-4">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-full shadow-lg border-2 border-primary">
                            <span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1">smart_toy</span>
                        </div>
                    </div>
                    <h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 mb-1">Học Toán Cùng Bé!</h1>
                    <p class="text-slate-600 dark:text-slate-400 font-medium">Chào mừng bé đến với thế giới con số</p>
                </div>
                <div class="absolute -bottom-2 -left-2 w-24 h-24 bg-primary/10 rounded-full blur-xl"></div>
                <div class="absolute -top-4 -right-4 w-32 h-32 bg-primary/20 blur-2xl"></div>
            </div>

            <div class="p-8 md:p-12">
                <form id="login-form" class="space-y-6" novalidate>
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-slate-700 dark:text-slate-300 font-bold text-lg" for="username">
                                <span class="material-symbols-outlined text-primary">person</span>
                                Tài khoản
                            </label>
                            <div class="relative group">
                                <input
                                    id="username"
                                    name="username"
                                    type="text"
                                    autocomplete="username"
                                    required
                                    class="w-full h-16 px-6 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl text-xl font-medium focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-400 dark:text-white"
                                    placeholder="Nhập tài khoản..."
                                />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-slate-700 dark:text-slate-300 font-bold text-lg" for="password">
                                <span class="material-symbols-outlined text-primary">lock</span>
                                Mật khẩu
                            </label>
                            <div class="relative group">
                                <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    autocomplete="current-password"
                                    required
                                    minlength="4"
                                    class="w-full h-16 px-6 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-2xl text-xl font-medium focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-slate-400 dark:text-white"
                                    placeholder="Nhập mật khẩu..."
                                />
                            </div>
                        </div>
                    </div>

                    <div id="login-error" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700 text-sm font-semibold" role="alert"></div>
                    <div id="login-status" class="hidden rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-700 text-sm font-semibold" role="status" aria-live="polite"></div>

                    <button id="login-submit" type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-extrabold text-2xl py-5 rounded-2xl shadow-xl shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                        <span id="login-submit-text">Bắt đầu học thôi!</span>
                        <span id="login-loading" class="hidden h-6 w-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        <span class="material-symbols-outlined text-3xl">rocket_launch</span>
                    </button>

                    <div class="flex items-center justify-center gap-6 pt-4">
                        <div class="flex flex-col items-center gap-1 group cursor-pointer">
                            <div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:bg-primary/10 group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">settings</span>
                            </div>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Cài đặt</span>
                        </div>
                        <div class="flex flex-col items-center gap-1 group cursor-pointer">
                            <div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:bg-primary/10 group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined">help</span>
                            </div>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Hướng dẫn</span>
                        </div>
                    </div>
                </form>
            </div>

            <div class="bg-slate-50 dark:bg-slate-800/50 py-4 px-8 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-sm font-semibold text-slate-500 dark:text-slate-400">1,234 bạn đang học</span>
                </div>
                <div class="flex gap-1">
                    <span class="material-symbols-outlined text-yellow-500" style="font-variation-settings: 'FILL' 1">star</span>
                    <span class="material-symbols-outlined text-yellow-500" style="font-variation-settings: 'FILL' 1">star</span>
                    <span class="material-symbols-outlined text-yellow-500" style="font-variation-settings: 'FILL' 1">star</span>
                </div>
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur px-6 py-3 rounded-full shadow-sm flex items-center gap-3 border border-primary/5">
                <img alt="Cute owl icon" class="w-8 h-8 rounded-full" data-alt="Cartoon smart owl mascot head icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfMTP6GFM-yQBDOf2okZ4-YKKYoT5FQapLdTKMuHGZ-Pds65DyXJMuFT4txFaHLZrI9fXT0ZtoMN1RSc218SgH63Rxrysgf-HVCIdfq0gjtCJx4pq0mY4vYyuTgDOgMza5qf3kXTYWzHM-0m9Os_EZYoY-5jD71-wT0RQKCXWOMdEbj1a1XccqOB77cFbxwNaLcDzBMNLCbszifRS75VOyHWGZ4XBE4PZhLBg6NosYCo6Pmv4aisO6NKmp_TNT8UsnJmidHa6z4ig"/>
                <p class="text-slate-600 dark:text-slate-300 font-bold text-sm">Học toán vui mỗi ngày!</p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-4 right-4 flex flex-col gap-2">
        <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-900 rounded-full shadow-lg text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" type="button">
            <span class="material-symbols-outlined">dark_mode</span>
        </button>
    </div>

    <script src="js/auth/login.js" defer></script>
</body>
</html>
